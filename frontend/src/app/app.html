<div class="min-h-screen bg-slate-950 text-slate-100">
  <header class="sticky top-0 z-20 border-b border-slate-800 bg-slate-950/90 backdrop-blur">
    <div class="mx-auto flex max-w-[95rem] items-center gap-4 px-4 py-3">
      <div class="min-w-40">
        <h1 class="text-lg font-bold tracking-wide text-cyan-300">MediQuick</h1>
        <p class="text-[11px] text-slate-400">Smart Pharmacy Platform</p>
      </div>
      <div class="hidden flex-1 md:block">
        <input type="text" placeholder="Search medicines, categories, brands" class="w-full rounded-xl border border-slate-700 bg-slate-900 px-4 py-2 text-sm outline-none focus:border-cyan-400" />
      </div>
      <nav class="ml-auto flex flex-wrap items-center gap-2">
        <a routerLink="/products" class="rounded-lg border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs font-medium hover:border-cyan-500">Medicines</a>
        <a routerLink="/cart" class="rounded-lg border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs font-medium hover:border-cyan-500">Cart</a>
        <a routerLink="/orders" class="rounded-lg border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs font-medium hover:border-cyan-500">Orders</a>
        <a *ngIf="isAdmin()" routerLink="/admin" class="rounded-lg border border-cyan-700 bg-cyan-950 px-3 py-1.5 text-xs font-semibold text-cyan-300 hover:border-cyan-500">Admin</a>
        <a *ngIf="!isLoggedIn()" routerLink="/auth" class="rounded-lg bg-cyan-500 px-3 py-1.5 text-xs font-semibold text-slate-950 hover:bg-cyan-400">Login / Register</a>
        <button *ngIf="isLoggedIn()" (click)="logout()" class="rounded-lg bg-rose-500 px-3 py-1.5 text-xs font-semibold text-white hover:bg-rose-400">Logout</button>
      </nav>
    </div>
  </header>
  <main class="mx-auto min-h-[calc(100vh-76px)] max-w-[95rem] p-4 md:p-8">
    <router-outlet />
  </main>
</div>
