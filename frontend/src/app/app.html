<div class="min-h-screen bg-slate-50 text-slate-900">
  <header class="bg-linear-to-r from-cyan-700 to-teal-600 text-white shadow-lg">
    <div class="mx-auto max-w-7xl px-4 py-2">
      <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-xl font-bold tracking-wide">MediQuick</h1>
          <p class="text-xs text-cyan-100">Online Pharmacy & Wellness Store</p>
        </div>
        <div class="w-full md:w-120">
          <input
            type="text"
            placeholder="Search for medicines and health products"
            class="w-full rounded-lg border-0 px-4 py-1.5 text-sm text-slate-800 shadow"
          />
        </div>
      </div>
      <nav class="mt-2 flex flex-wrap items-center gap-2">
        <a routerLink="/products" class="rounded-full bg-white/20 px-4 py-1 text-sm font-medium hover:bg-white/30">Medicines</a>
        <a routerLink="/cart" class="rounded-full bg-white/20 px-4 py-1 text-sm font-medium hover:bg-white/30">Cart</a>
        <a routerLink="/checkout" class="rounded-full bg-white/20 px-4 py-1 text-sm font-medium hover:bg-white/30">Checkout</a>
        <a routerLink="/orders" class="rounded-full bg-white/20 px-4 py-1 text-sm font-medium hover:bg-white/30">Orders</a>
        <a *ngIf="!isLoggedIn()" routerLink="/auth" class="rounded-full bg-emerald-500 px-4 py-1 text-sm font-semibold hover:bg-emerald-400">Login / Register</a>
        <button *ngIf="isLoggedIn()" (click)="logout()" class="rounded-full bg-rose-500 px-4 py-1 text-sm font-semibold hover:bg-rose-400">Logout</button>
      </nav>
    </div>
  </header>
  <main class="mx-auto min-h-[calc(100vh-110px)] max-w-7xl p-5 md:p-7">
    <router-outlet />
  </main>
</div>
